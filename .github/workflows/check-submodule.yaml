name: Check and Update Submodule

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # IMPORTANT: You must add GHCR_PAT to your Repository Secrets
          token: ${{ secrets.GHCR_PAT }}

      - name: Update and Filter Submodule
        id: check_changes
        run: |
          SUBMODULE_PATH="squeezelite"
          
          # 1. Get current hash
          OLD_COMMIT=$(git rev-parse :$SUBMODULE_PATH)

          # 2. Update to latest remote
          git submodule update --remote --init --recursive $SUBMODULE_PATH
          NEW_COMMIT=$(git -C $SUBMODULE_PATH rev-parse HEAD)

          # 3. Check if hash changed
          if [ "$OLD_COMMIT" == "$NEW_COMMIT" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 4. Filter for non-markdown changes
          if git -C $SUBMODULE_PATH diff --name-only $OLD_COMMIT $NEW_COMMIT | grep -qv '\.md$'; then
            echo "Significant code changes found."
            
            # 5. GENERATE CHANGELOG
            CHANGELOG=$(git -C $SUBMODULE_PATH log $OLD_COMMIT..$NEW_COMMIT --oneline --no-merges)
            
            # Write results to GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "Only documentation changes found. Skipping."
            git submodule update --checkout $SUBMODULE_PATH
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GHCR_PAT }}
          branch: auto/update-squeezelite
          base: main
          delete-branch: true
          title: "📦 chore(deps): update squeezelite submodule"
          commit-message: "chore: update squeezelite to latest version"
          body: |
            ### 🔄 Submodule Update: Squeezelite
            
            Automated update detected new code changes in the upstream repository.
            
            #### 📝 Upstream Changes:
            ```text
            ${{ steps.check_changes.outputs.changelog }}
            ```
            
            ---
            *Auto-generated by GitHub Actions.*
          labels: |
            submodule
            automated-update
