name: Check and Update Submodules

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GHCR_PAT }}

      - name: Update and Filter Submodules
        id: check_changes
        run: |
          # Define your directories here
          PATHS=("squeezelite" "squeezelite-orig")
          CHANGES_FOUND="false"
          COMBINED_LOG=""

          for SUBMODULE_PATH in "${PATHS[@]}"; do
            echo "Checking $SUBMODULE_PATH..."
            
            # 1. Get current hash
            OLD_COMMIT=$(git rev-parse :$SUBMODULE_PATH)

            # 2. Update to latest remote
            git submodule update --remote --init --recursive $SUBMODULE_PATH
            NEW_COMMIT=$(git -C $SUBMODULE_PATH rev-parse HEAD)

            # 3. Check if hash changed
            if [ "$OLD_COMMIT" != "$NEW_COMMIT" ]; then
              # 4. Filter for non-markdown changes
              if git -C $SUBMODULE_PATH diff --name-only $OLD_COMMIT $NEW_COMMIT | grep -qv '\.md$'; then
                echo "Significant changes found in $SUBMODULE_PATH."
                CHANGES_FOUND="true"
                
                # 5. Add to the combined changelog
                LOG=$(git -C $SUBMODULE_PATH log $OLD_COMMIT..$NEW_COMMIT --oneline --no-merges)
                COMBINED_LOG="${COMBINED_LOG}\n\n### 📁 $SUBMODULE_PATH\n$LOG"
              else
                echo "Only docs changed in $SUBMODULE_PATH. Rolling back."
                git submodule update --checkout $SUBMODULE_PATH
              fi
            fi
          done

          # Output results for the next step
          echo "has_changes=$CHANGES_FOUND" >> $GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo -e "$COMBINED_LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or Update Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GHCR_PAT }}
          branch: auto/update-submodules
          base: main
          delete-branch: true
          title: "📦 chore(deps): update squeezelite submodules"
          commit-message: "chore: update submodules to latest versions"
          body: |
            ### 🔄 Submodule Updates Detected
            
            Automated update detected new code changes in upstream repositories.
            
            #### 📝 Changes:
            ${{ steps.check_changes.outputs.changelog }}
            
            ---
            *Auto-generated by GitHub Actions.*
          labels: |
            submodule
            automated-update