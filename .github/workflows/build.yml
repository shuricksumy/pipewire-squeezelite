name: Build_Push_Scan

permissions:
  contents: read
  pull-requests: write
  packages: write  # Required for pushing to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '*.md'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Manual tag name (defaults to latest if empty)'
        required: false
        default: 'latest'

# --- Force the runner to use Node 24 for all actions ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/squeezelite-pipewire
          tags: |
            # Tag 'latest' only on the main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with the branch name (e.g., :main)
            type=ref,event=branch
            # Tag with the release version if applicable
            type=semver,pattern={{version}}
            # Handle manual workflow dispatch tag
            type=raw,value=${{ github.event.inputs.tag_name }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and Push Docker Image
        # Updated to v6 for Node 24 support
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
